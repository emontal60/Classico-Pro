<!DOCTYPE html>
<!-- This is a copy of OwnerPortal.html renamed to index.html for GitHub Pages -->
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classico | Owner Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --panel: rgba(17, 24, 39, 0.7);
            --accent: #00e5ff;
            --accent-glow: rgba(0, 229, 255, 0.3);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --success: #10b981;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body {
            font-family: 'Cairo', 'Outfit', sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 229, 255, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(14, 165, 233, 0.05) 0%, transparent 20%);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .glass {
            background: var(--panel);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 24px;
        }

        #auth-screen {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            background: var(--bg);
        }
        .auth-card { width: 100%; max-width: 420px; padding: 3rem; text-align: center; }
        .auth-logo { font-size: 3rem; font-weight: 900; color: var(--accent); letter-spacing: -2px; margin-bottom: 0.5rem; }
        .auth-subtitle { color: var(--text-dim); margin-bottom: 2.5rem; font-size: 0.9rem; }
        
        .input-group { position: relative; margin-bottom: 1.5rem; text-align: right; }
        .input-group label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 0.5rem; padding-right: 0.5rem; }
        .input-group input {
            width: 100%; padding: 1rem 1.2rem;
            background: rgba(0,0,0,0.3); border: 1px solid var(--border);
            border-radius: 14px; color: #fff; font-size: 1rem; text-align: right;
        }
        .input-group input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }
        
        .btn-primary {
            width: 100%; padding: 1rem; background: var(--accent); color: #000;
            border: none; border-radius: 14px; font-weight: 900; font-size: 1.1rem; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 229, 255, 0.2);
        }

        .app-container { display: none; padding: 2rem; max-width: 1400px; margin: 0 auto; width: 100%; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; }
        .user-info { display: flex; align-items: center; gap: 1rem; }
        
        .btn-refresh {
            background: rgba(0, 229, 255, 0.1); border: 1px solid var(--accent); color: var(--accent);
            padding: 0.6rem 1.2rem; border-radius: 50px; cursor: pointer; font-weight: 800;
            display: flex; align-items: center; gap: 8px; font-size: 0.9rem;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }
        .btn-refresh:hover { background: var(--accent); color: #000; box-shadow: 0 0 25px var(--accent); }
        .btn-refresh i { font-style: normal; display: inline-block; transition: 0.5s; }
        .btn-refresh:active i { transform: rotate(360deg); }

        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem; margin-bottom: 3rem;
        }
        .stat-box { padding: 1.5rem 2rem; display: flex; flex-direction: column; gap: 0.2rem; border-left: 4px solid var(--accent); }
        .stat-label { font-size: 0.85rem; color: var(--text-dim); font-weight: 700; }
        .stat-value { font-size: 2.2rem; font-weight: 900; color: #fff; }
        .stat-box.revenue { border-left-color: var(--success); }
        .stat-box.revenue .stat-value { color: var(--success); }

        .table-container { padding: 2rem; margin-bottom: 2rem; }
        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .table-title { font-size: 1.4rem; font-weight: 800; }
        .table-title span { color: var(--accent); }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: right; padding: 1.2rem; color: var(--text-dim); font-size: 0.85rem; border-bottom: 1px solid var(--border); }
        td { padding: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .id-cell { font-family: 'Outfit'; color: var(--accent); font-weight: 600; cursor: pointer; }
        
        .badge { padding: 4px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 800; }
        .badge-pending { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .badge-active { background: rgba(16, 185, 129, 0.1); color: #10b981; }

        /* Action Buttons Group */
        .actions-group { display: flex; align-items: center; gap: 10px; }
        .adjust-box { display: flex; align-items: center; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 2px 8px; border: 1px solid var(--border); }
        .adjust-input { width: 45px; background: transparent; border: none; color: var(--accent); text-align: center; font-weight: 800; font-size: 1rem; }
        .adjust-input:focus { outline: none; }
        
        .btn-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; border: none; cursor: pointer; transition: 0.2s; }
        .btn-edit { background: var(--accent); color: #000; padding: 5px 12px; border-radius: 8px; font-weight: 800; font-size: 0.75rem; border: none; cursor: pointer; }
        .btn-edit:hover { box-shadow: 0 0 15px var(--accent-glow); transform: translateY(-1px); }
        .btn-del { background: rgba(239, 68, 68, 0.1); color: var(--danger); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; border: none; cursor: pointer; transition: 0.2s; }
        .btn-del:hover { background: var(--danger); color: #fff; }

        .btn-approve { padding: 8px 20px; border-radius: 10px; background: var(--success); color: #000; border: none; font-weight: 800; cursor: pointer; }

        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 10000; }
        .modal-card { width: 90%; max-width: 400px; padding: 2.5rem; text-align: center; }
        .modal-btns { display: flex; gap: 1rem; margin-top: 2rem; }
        .modal-btns button { flex: 1; padding: 1rem; border-radius: 12px; border: none; cursor: pointer; font-weight: 800; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card glass">
            <div class="auth-logo">CLASSICO</div>
            <div class="auth-subtitle">بوابة المالك السحابية</div>
            <div class="input-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="login-email" value="emontal.33@yahoo.com">
            </div>
            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" id="login-password" placeholder="••••••••">
            </div>
            <button class="btn-primary" onclick="login()">دخول آمن</button>
            <p id="auth-error" style="color:var(--danger); margin-top:1rem; display:none;"></p>
        </div>
    </div>

    <div class="app-container" id="dashboard">
        <header>
            <div>
                <h1 style="margin:0; font-weight:900;">لوحة إدارة <span style="color:var(--accent)">كلاسيكو</span></h1>
                <p id="display-email" style="color:var(--text-dim); font-size:0.9rem; margin-top:4px;"></p>
            </div>
            <div class="user-info">
                <button class="btn-refresh" onclick="refreshData()"><i>🔄</i> تحديث البيانات</button>
                <button class="btn-del" style="padding:10px 20px; border-radius:50px;" onclick="logout()">خروج</button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-box glass">
                <span class="stat-label">المشتركين النشطين</span>
                <span class="stat-value" id="stat-active">0</span>
            </div>
            <div class="stat-box glass revenue">
                <span class="stat-label">إجمالي الأرباح المتوقعة</span>
                <span class="stat-value" id="stat-revenue">0 <small style="font-size:1rem">ج.م</small></span>
            </div>
            <div class="stat-box glass" style="border-left-color: #f59e0b">
                <span class="stat-label">طلبات معلقة</span>
                <span class="stat-value" id="stat-pending">0</span>
            </div>
        </div>

        <div class="table-container glass">
            <div class="table-header">
                <div class="table-title">📥 طلبات <span>التفعيل</span></div>
            </div>
            <table id="pending-table">
                <thead>
                    <tr><th>الجهاز</th><th>الباقة</th><th>التاريخ</th><th>الإجراء</th></tr>
                </thead>
                <tbody id="pending-body"></tbody>
            </table>
        </div>

        <div class="table-container glass">
            <div class="table-header">
                <div class="table-title">✅ المشتركين <span>النشطين</span></div>
            </div>
            <table>
                <thead>
                    <tr><th>الجهاز</th><th>ينتهي في</th><th>المتبقي</th><th>الإجراءات</th></tr>
                </thead>
                <tbody id="active-body"></tbody>
            </table>
        </div>

        <div class="table-container glass" style="opacity: 0.8">
            <div class="table-header">
                <div class="table-title">⏳ سجل <span>الاشتراكات</span></div>
            </div>
            <table>
                <thead>
                    <tr><th>الجهاز</th><th>الباقة</th><th>من</th><th>إلى</th><th>إجراء</th></tr>
                </thead>
                <tbody id="history-body"></tbody>
            </table>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal-card glass">
            <h3 id="modal-title">تنبيه</h3>
            <p id="modal-msg"></p>
            <div class="modal-btns">
                <button style="background:rgba(255,255,255,0.05); color:#fff" onclick="closeModal()">إلغاء</button>
                <button class="btn-primary" id="modal-confirm">تأكيد</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://qhlxmdbvvqelgbyzpugt.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFobHhtZGJ2dnFlbGdieXpwdWd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDQzNjIsImV4cCI6MjA5MjI4MDM2Mn0.0m75h76gjrkR9zADCrkw-0zsibI4qXGhM8PzlZdkSgk';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function login() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) {
                document.getElementById('auth-error').innerText = error.message;
                document.getElementById('auth-error').style.display = 'block';
            } else {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            }
        }

        function showDashboard(user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('display-email').innerText = user.email;
            refreshData();
        }

        function logout() { supabaseClient.auth.signOut(); location.reload(); }

        // Init & Session Persistence
        async function initAuth() {
            // 1. Check manual persistence first (for local file stability)
            const savedUser = sessionStorage.getItem('classico_owner');
            if (savedUser) {
                showDashboard(JSON.parse(savedUser));
            }

            // 2. Check initial supabase session
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session && !savedUser) showDashboard(session.user);

            // 3. Listen for changes (Login/Logout/Refresh)
            supabaseClient.auth.onAuthStateChange((event, session) => {
                if (event === 'SIGNED_IN' && session) {
                    sessionStorage.setItem('classico_owner', JSON.stringify(session.user));
                    showDashboard(session.user);
                } else if (event === 'SIGNED_OUT') {
                    sessionStorage.removeItem('classico_owner');
                    document.getElementById('auth-screen').style.display = 'flex';
                    document.getElementById('dashboard').style.display = 'none';
                }
            });
        }
        initAuth();

        async function refreshData() {
            const btn = document.querySelector('.btn-refresh i');
            btn.style.transform = 'rotate(360deg)';
            
            const { data: subs } = await supabaseClient.from('subscriptions').select('*').order('created_at', {ascending: false});
            const { data: logs } = await supabaseClient.from('subscription_logs').select('*').order('activated_at', {ascending: false});
            
            renderTables(subs || [], logs || []);
            setTimeout(() => btn.style.transform = 'rotate(0deg)', 500);
        }

        function renderTables(subs, logs) {
            const pendingBody = document.getElementById('pending-body');
            const activeBody = document.getElementById('active-body');
            const historyBody = document.getElementById('history-body');
            pendingBody.innerHTML = activeBody.innerHTML = historyBody.innerHTML = '';

            let pCount = 0, aCount = 0, totalRev = 0;

            subs.forEach(s => {
                if (s.status === 'pending') {
                    pCount++;
                    pendingBody.innerHTML += `
                        <tr>
                            <td class="id-cell">${s.machine_id}</td>
                            <td><span class="badge badge-pending">${s.plan_type === 'yearly'?'سنوي':'شهري'}</span></td>
                            <td>${new Date(s.created_at).toLocaleDateString('ar-EG')}</td>
                            <td><button class="btn-approve" onclick="approve('${s.machine_id}', '${s.plan_type}')">تفعيل</button></td>
                        </tr>
                    `;
                } else if (s.status === 'active') {
                    aCount++;
                    totalRev += (s.plan_type === 'yearly' ? 4500 : 400);
                    const rem = Math.max(0, Math.ceil((new Date(s.expires_at) - new Date()) / (1000*60*60*24)));
                    activeBody.innerHTML += `
                        <tr>
                            <td class="id-cell">${s.machine_id}</td>
                            <td>${new Date(s.expires_at).toLocaleDateString('ar-EG')}</td>
                            <td style="color:${rem<5?'var(--danger)':'var(--success)'}; font-weight:900">${rem} يوم</td>
                            <td>
                                <div class="actions-group">
                                    <div class="adjust-box">
                                        <input type="number" id="adj-${s.machine_id}" value="0" class="adjust-input">
                                        <button class="btn-edit" onclick="adjust('${s.machine_id}', '${s.expires_at}')">تعديل المدة</button>
                                    </div>
                                    <button class="btn-del" title="حذف" onclick="reject('${s.machine_id}')">🗑️</button>
                                </div>
                            </td>
                        </tr>
                    `;
                }
            });

            logs.forEach(l => {
                historyBody.innerHTML += `
                    <tr>
                        <td>${l.machine_id}</td>
                        <td>${l.plan_type==='yearly'?'سنوي':'شهري'}</td>
                        <td>${new Date(l.activated_at).toLocaleDateString('ar-EG')}</td>
                        <td>${l.expires_at ? new Date(l.expires_at).toLocaleDateString('ar-EG') : '---'}</td>
                        <td><button class="btn-icon btn-del" onclick="deleteLog(${l.id})">🗑️</button></td>
                    </tr>
                `;
            });

            document.getElementById('stat-active').innerText = aCount;
            document.getElementById('stat-pending').innerText = pCount;
            document.getElementById('stat-revenue').innerHTML = `${totalRev.toLocaleString()} <small style="font-size:1rem">ج.م</small>`;
        }

        async function approve(mid, plan) {
            const days = plan === 'yearly' ? 365 : (plan === 'monthly' ? 30 : 7);
            const expiry = new Date(); expiry.setDate(expiry.getDate() + days);
            confirmAction('تفعيل الجهاز', `تفعيل ${mid}؟`, async () => {
                await supabaseClient.from('subscriptions').update({ status: 'active', expires_at: expiry.toISOString() }).eq('machine_id', mid);
                await supabaseClient.from('subscription_logs').insert({ machine_id: mid, plan_type: plan, status: 'active', expires_at: expiry.toISOString() });
                refreshData();
            });
        }

        async function adjust(mid, current) {
            const val = parseInt(document.getElementById(`adj-${mid}`).value);
            if (val === 0) return;
            const newDate = new Date(current); newDate.setDate(newDate.getDate() + val);
            await supabaseClient.from('subscriptions').update({ expires_at: newDate.toISOString() }).eq('machine_id', mid);
            refreshData();
        }

        async function reject(mid) {
            confirmAction('حذف', `حذف ${mid}؟`, async () => {
                await supabaseClient.from('subscriptions').delete().eq('machine_id', mid);
                refreshData();
            });
        }

        async function deleteLog(id) {
            confirmAction('حذف سجل', 'حذف هذا السجل نهائياً؟', async () => {
                await supabaseClient.from('subscription_logs').delete().eq('id', id);
                refreshData();
            });
        }

        function confirmAction(title, msg, onConfirm) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-msg').innerText = msg;
            document.getElementById('modal-overlay').style.display = 'flex';
            document.getElementById('modal-confirm').onclick = () => { closeModal(); onConfirm(); };
        }
        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    </script>
</body>
</html>
